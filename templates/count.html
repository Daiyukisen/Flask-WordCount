<h3>Sentiment Analysis:</h3>
<p><strong>Overall Sentiment:</strong> {{ sentiment }}</p>
<p><strong>Score:</strong> {{ score }}</p>

<h4>Sentiment Breakdown:</h4>
<ul class="list-group">
    <li class="list-group-item d-flex justify-content-between align-items-center">
        Positive Words
        <span class="badge badge-success badge-pill">{{ positive_count }}</span>
    </li>
    <li class="list-group-item d-flex justify-content-between align-items-center">
        Negative Words
        <span class="badge badge-danger badge-pill">{{ negative_count }}</span>
    </li>
    <li class="list-group-item d-flex justify-content-between align-items-center">
        Neutral Words
        <span class="badge badge-secondary badge-pill">{{ neutral_count }}</span>
    </li>
</ul>
