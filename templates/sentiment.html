<form id="sentimentForm">
    <textarea class="form-control" name="text" cols="40" rows="5" placeholder="Type your sentence here..." required></textarea>
    <br>
    <button type="submit" class="btn btn-primary btn-lg">Analyze Sentiment</button>
</form>

<script>
document.getElementById("sentimentForm").addEventListener("submit", function(event) {
    event.preventDefault();
    const text = document.querySelector("[name='text']").value;

    fetch("{{ url_for('sentiment_bp.create_sentiment') }}", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
    })
    .then(response => response.json())
    .then(data => alert(`Sentiment: ${data.data.sentiment}\nScore: ${data.data.score}`))
    .catch(error => alert("Error analyzing sentiment"));
});
</script>
